name: Morning Cycle
on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 JST (21:00 UTC)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          if [ "${X_CLIENT:-api}" = "playwright" ]; then
            playwright install chromium --with-deps
          fi
        env:
          X_CLIENT: ${{ secrets.X_CLIENT }}
      - name: Random delay (anti-freeze)
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Waiting ${DELAY}s ($(( DELAY / 60 )) min) before posting..."
          sleep $DELAY
      - name: Run morning cycle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          X_CLIENT: ${{ secrets.X_CLIENT }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: python scripts/worker.py --cycle morning
